name: test
permissions:
  contents: write
on:
  push:
    branches: [main]
    paths:
      - crates/**
      - bin/**
      - Cargo.toml
      - Cargo.lock
      - Dockerfile
      - .github/workflows/**
  pull_request:
    paths:
      - crates/**
      - bin/**
      - Cargo.toml
      - Cargo.lock
      - Dockerfile
      - .github/workflows/**
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
jobs:
  unit-tests:
    runs-on:
      group: large-runners
    name: Unit Tests
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      # Build and run tests directly
      - name: Run unit tests
        run: cargo test --workspace --all-features --all-targets

  sql-logic-tests-and-update-readme:
    runs-on:
      group: large-runners
    name: SQL Logic Tests
    env:
      SNOWFLAKE_ACCOUNT: test
      SNOWFLAKE_USER: test
      SNOWFLAKE_PASSWORD: test
      WAREHOUSE: COMPUTE_WH
      DATABASE: embucket
      SCHEMA: public
      RESET_DB: false
      EMBUCKET_ENABLED: true
      EMBUCKET_PROTOCOL: http
      EMBUCKET_HOST: localhost
      EMBUCKET_PORT: 3000
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      # Build only the embucketd binary
      - name: Build embucketd
        run: cargo build --bin embucketd

      - name: Start Embucket Server
        run: |
          target/debug/embucketd &
          echo "Starting Embucket server..."
          sleep 20

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install -r test/slt_runner/requirements.txt

      - name: Run SQL Logic Tests
        working-directory: ./test
        run: |
          python -u -m slt_runner --test-dir sql

      - name: Update README with Test Results
        working-directory: ./test
        run: |
          python update_readme.py

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin ${{ github.head_ref }}
          git checkout ${{ github.head_ref }}
          
          # Add the changed files
          git add README.md test/README.md test/assets/
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            # Commit the changes
            git commit -m "Update README with latest test results"
          
            # Pull any remote changes
            git pull --rebase origin ${{ github.head_ref }}
          
            # Push the changes
            git push origin HEAD:${{ github.head_ref }}
          fi
  slt-pr-comment:
    runs-on: ubuntu-latest
    needs: [ sql-logic-tests-and-update-readme ]
    if: github.event_name == 'pull_request'
    name: Generate SLT Coverage Comment
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed to fetch all history for PR changes

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install openai pandas requests
          pip install -r test/slt_runner/requirements.txt  # Install SLT runner dependencies

      - name: Get PR Changes
        id: pr_changes
        run: |
          # Get the diff between the PR branch and the base branch
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt

      - name: Analyze PR Changes and SLT Coverage
        id: analyze
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Make script executable if needed
          chmod +x .github/scripts/analyze_slt_coverage.py

          # Run the analysis script
          python .github/scripts/analyze_slt_coverage.py \
            --pr-diff-file pr_diff.txt \
            --slt-results-file test/test_statistics.csv \
            --output-file slt_analysis.txt
        continue-on-error: true  # Make this non-blocking for the PR

      - name: Create PR Comment
        if: steps.analyze.outcome == 'success'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            try {
              const analysis = fs.readFileSync('slt_analysis.txt', 'utf8');

              // Only create comment if there's content in the analysis
              if (analysis.trim()) {
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: `## SQL Logic Test Coverage Analysis\n\n${analysis}\n\n_This analysis was generated automatically based on the PR changes and SLT results._`
                });
                console.log('PR comment created successfully');
              } else {
                console.log('No matching SLTs found. Skipping comment creation.');
              }
            } catch (error) {
              console.log('Error reading analysis file: ' + error.message);
            }